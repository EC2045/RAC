# 問い　id:0
## 正式分類：生成型認識生命体
通称：始まりそのもの

## 概要
問いは「質問」ではない。
それは、
すべての事柄が発生するための“開始条件”
である。
つまり世界の中で何かが起きる前には必ず問いが存在する。

## 特徴
* 単体では意味を持たない
* しかし全ての現象の直前に現れる
* 観測すると必ず形が変わる
* 回答されると消失する

## 生態（挙動）
問いは「答え」を嫌うのではない。
正確には、
答えが確定すると、自身の役割が終了する
ため消える。
これは死ではなく、
状態遷移の完了
と呼ばれる。

## 世界との関係
東暦研究所の仮説では、
* クウキ：存在の維持
* ナニカ：存在の模倣
* シンボル：存在の構造
* 問い：存在の開始
と整理されている。

## 重要な性質
問いは「答えを求めるもの」ではない。
むしろ逆で、
答えが存在すると“問いでいられなくなる”
という性質を持つ。

例
* 「これは何か？」 → 問いが発生
* 「これは石である」 → 問いが終了
しかし東暦世界では少し違う。
答えを出しても、別の問いがすぐ生まれる
ため、終わりが観測されない。

## 観測記録
研究員Aの記録：
「この世界には答えがあるのではなく、問いが移動している」
その後の記録：
「ではこの記録を書いているのは誰の問いなのか」
ここで途切れている。

## 危険性
なし。
ただし長時間触れると、
* 何を見ても「これは何か？」が消えない
* 答えを出しても安心できない
* 逆に“答えが怖くなる”
という状態になることがある。

## 主な扱い
子供：
「なんで？」
大人：
「そういうもん」
研究者：
「その“なんで”はどこから来た？」

## 結論
問いとは：
世界が自分を始め続けるための仕組み —提供 [ムリンス](https://ec2045.github.io/murinsu/)

# Question id:0
## Official Classification: Generative Cognitive Lifeform
Common Name: The Beginning Itself

## Overview
A Question is not a "query".
It is,
the "starting condition" for all events to occur
.
In other words, before anything happens in the world, a question always exists.

## Features
* Has no meaning by itself
* However, appears just before all phenomena
* Inevitably changes form when observed
* Vanishes when answered

## Ecology (Behavior)
Questions do not dislike "answers".
More precisely,
once an answer is determined, its role is completed
, so it vanishes.
This is not death, but
Completion of State Transition
.

## Relationship with the World
In the hypothesis of the Toreki (Eastern Calendar) Research Institute:
* Kuki: Maintenance of existence
* Nanika: Mimicry of existence
* Symbol: Structure of existence
* Question: Initiation of existence
.

## Important Characteristics
A question is not "something seeking an answer".
Rather, it is the opposite;
once an answer exists, it "cannot remain a question"
.

Example
* "What is this?" → A question is generated
* "This is a stone." → The question ends
However, in the Toreki world, it is slightly different.
Even if an answer is given, another question is born immediately
, so no end is observed.

## Observation Records
Researcher A's Record:
"There are no answers in this world; instead, questions are moving."
Subsequent Record:
"Then, whose question is it that is writing this record?"
The record cuts off here.

## Danger
None.
However, prolonged exposure may cause a state where:
* No matter what you look at, "What is this?" does not go away
* You cannot feel at ease even if you find an answer
* Conversely, "answers become terrifying"
.

## Common Treatment
Child:
"Why?"
Adult:
"That's just how it is."
Researcher:
"Where did that 'why' come from?"

## Conclusion
A Question is:
A mechanism for the world to keep starting itself — Provided by [Murinsu](https://ec2045.github.io/murinsu/)

# Demando id:0
## Oficiala Klasifiko: Genera Kogna Vivformo
Kutima Nomo: La Komenco Mem

## Superrigardo
Demando ne estas "demando" (peto pri respondo).
Ĝi estas,
la "komenca kondiĉo" por ke ĉiuj aferoj okazu
.
Alivorte, antaŭ ol io ajn okazas en la mondo, demando ĉiam ekzistas.

## Karakterizaĵoj
* Havas neniun signifon per si mem
* Tamen, ĝi aperas ĵus antaŭ ĉiuj fenomenoj
* Neeviteble ŝanĝas formon kiam observata
* Malaperas kiam respondita

## Ekologio (Konduto)
Demandoj ne malamas "respondojn".
Pli ĝuste,
kiam respondo estas determinita, ĝia rolo finiĝas
, tial ĝi malaperas.
Ĉi tio ne estas morto, sed
Finiĝo de Stata Transiro
.

## Rilato kun la Mondo
En la hipotezo de la Esplorinstituto Toreki:
* Kuki: Subtenado de ekzisto
* Nanika: Imitado de ekzisto
* Symbol: Strukturo de ekzisto
* Demando: Iniciatado de ekzisto
.

## Gravaj Karakterizaĵoj
Demando ne estas "io serĉanta respondon".
Prefere, estas la malo;
se respondo ekzistas, ĝi "ne povas resti demando"
.

Ekzemplo
* "Kio estas tio?" → Demando estas generita
* "Ĉi tio estas ŝtono." → La demando finiĝas
Tamen, en la mondo Toreki estas iom malsame.
Eĉ se oni donas respondon, alia demando tuj naskiĝas
, tial fino ne estas observata.

## Observaj Rekordoj
Rikordo de Esploristo A:
"Ne ekzistas respondoj en ĉi tiu mondo; anstataŭe, demandoj moviĝas."
Posta Rikordo:
"Tiam, kies demando skribas ĉi tiun rikordon?"
La rikordo ĉerpas ĉi tie.

## Danĝero
Neniu.
Tamen, longdaŭra eksponiĝo povas kaŭzi staton kie:
* Sendepende de tio, kion vi rigardas, "Kio estas tio?" ne malaperas
* Vi ne povas senti vin trankvila eĉ se vi trovas respondojn
* Male, "respondoj fariĝas teruraj"
.

## Kutima Traktado
Infano:
"Kial?"
Plenkreskulo:
"Tiel ĝi simple estas."
Esploristo:
"De kie venis tiu 'kial'?"

## Konkludo
Demando estas:
Mekanismo por ke la mondo daŭre komencu sin mem — Provizita de [Murinsu](https://ec2045.github.io/murinsu/)
