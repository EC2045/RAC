# モバジュウ　id:1
## 分類：擬態寄生生物
外見：モバイルバッテリー
主食：電力

![モバジュウ](../images/001.png)

## 特徴
* 見た目は一般的なモバイルバッテリーと区別がつかない。
* USBケーブルを接続すると活動を開始する。
* 充電されるどころか、接続した機器やコンセントから電力を吸収する。

## 生態
モバジュウは本来体内で発電できない。
そのため、
「人間が自ら電力を運んできてくれる」
という生存戦略を獲得した。
研究者からは
「進化の勝者」
とも
「電子機器界の吸血鬼」
とも呼ばれている。

## 行動
空腹時は机やカバンの中で静止し、本物のモバイルバッテリーに擬態する。
十分な電力を吸収すると、LEDランプのような模様が光り始める。
この光は残量表示ではなく、
満腹アピール
である。

## 繁殖
十分な電力を蓄えるとUSBポートから小型個体を排出する。
生まれた個体は
* USBメモリ
* ACアダプタ
* ケーブル
などに擬態して成長する。

## とある研究所報告
モバイルバッテリーを充電しようとして電気代が三倍になった事例が報告されている。
一部の個体は急速充電規格を理解しており、より効率よく栄養摂取を行う。

## 飼育
理論上は可能。
ただし毎月の電気代が高額になるため、
「飼い主の方が先に餓死する」
とされる。

# Mobaju id:1
## Classification: Mimicry Parasite
Appearance: Mobile Battery
Staple Food: Electricity

![Mobaju](../images/001.png)

## Features
* Looks indistinguishable from a general mobile battery.
* Starts active when a USB cable is connected.
* Instead of being charged, it absorbs power from the connected device or outlet.

## Ecology
Mobaju cannot generate electricity inside its body originally.
Therefore,
it acquired the survival strategy of "humans bringing electricity on their own".
Researchers call it
"the winner of evolution"
and
"the vampire of the electronics world"
.

## Behavior
When hungry, it remains still in desks or bags, mimicking a real mobile battery.
When it absorbs enough power, patterns resembling LED lamps start to light up.
This light is not a remaining battery indicator, but
a satiety appeal
.

## Breeding
When it stores enough power, it discharges small individuals from the USB port.
The born individuals grow up mimicking:
* USB flash drives
* AC adapters
* Cables
and so on.

## Report from a Certain Institute
Cases have been reported where the electricity bill tripled after trying to charge Mobaju.
Some individuals understand fast charging standards and ingest nutrients more efficiently.

## Breeding as Pet
Theoretically possible.
However, since the monthly electricity bill becomes extremely expensive,
"the owner will starve to death first"
.

# Mobaĵu id:1
## Klasifiko: Mimika Parazito
Aspekto: Poŝtelefona Kuirilaro
Ĉefa Nutraĵo: Elektro

![Mobaĵu](../images/001.png)

## Karakterizaĵoj
* Aspektas nedistingeble de ordinara poŝtelefona kuirilaro.
* Komencas aktivi kiam USB-kablo estas konektita.
* Anstataŭ esti ŝargita, ĝi sorbas elektron de la konektita aparato aŭ ingo.

## Ekologio
Mobaĵu origine ne povas generi elektron en sia korpo.
Tial,
ĝi akiris la postviv-strategion de "homoj mem alportantaj elektron".
Esploristoj nomas ĝin
"la gajninto de evoluo"
kaj
"la vampiro de la mondo de elektronikaĵoj"
.

## Konduto
Kiam ĝi estas malsata, ĝi restas kvieta en skribotabloj aŭ sakoj, imitante veran poŝtelefonan kuirilaron.
Kiam ĝi sorbas sufiĉe da elektro, ekbrilas skemoj similaj al LED-lampoj.
Ĉi tiu lumo ne estas indikilo de restanta elektro, sed
atesto pri sateco
.

## Reproduktado
Kiam ĝi konservas sufiĉe da elektro, ĝi ellasas malgrandajn idojn de la USB-pordo.
La naskitaj idoj kreskas imitante:
* USB-memorilojn
* AK-adaptilojn
* Kablojn
kaj tiel plu.

## Rikordo de Iu Instituto
Okazis raportoj, ke la elektra fakturo triobliĝis post provo ŝargi Mobaĵu-on.
Iuj idoj komprenas rapidajn ŝargajn normojn kaj sorbas nutraĵojn pli efike.

## Zorgado
Teorie ebla.
Tamen, ĉar la monata elektra fakturo fariĝas tre multekosta,
"la posedanto unue mortos pro malsato"
.
