# トモガサ　 id:2
## 正式分類：感情寄生型擬態生物
通称：友達になりたかった傘

## 特徴
* 外見はごく普通の傘。
* 雨の日になると人の近くへ移動する。
* 持ち主がいないように見えることが多い。
一見ただの忘れ物だが、生物である。

## 生態
トモガサは人間の「一緒に帰る」という行為に強い憧れを持つ。
しかし人間ではないため会話できず、傘として近くにいることしかできない。
そのため、
「せめて誰かと帰りたい」
という願望から傘へ擬態したと考えられている。

## 行動
雨の日、
* 誰かの近くに立つ
* 下校時間に校門付近へ現れる
* 駅の傘立てに紛れる
などの行動をとる。
運良く誰かに使われると非常に喜ぶ。
その日は骨組みの動きが少し軽くなる。

## 友達化現象
同じ人物に長期間使われ続けると、認識定着が起きる。
持ち主は次第に
「なんかこの傘、相棒みたいだな」
と感じ始める。
研究者によれば、この状態はトモガサが最も幸福な状態である。

## 最終段階
極めて稀に、
持ち主が
「これは俺の友達だ」
と本気で思った場合、
トモガサは傘としての生態を終える。
その後どうなるかは不明。
ある説では、
本物の友達になれたため消滅する。
別の説では、
人間へ進化するとされる。

## 研究所記録
ある生徒が三年間同じ傘を使い続けた。
卒業式の日、
「今までありがとな」
と声をかけた直後、
傘は風もないのに少しだけ揺れたという。

## 危険度
なし。
むしろ研究者の間では
「見つけたら大事に使うべき生物」
とされている。

# Tomogasa id:2
## Classification: Emotion-parasitic Mimicry Lifeform
Common Name: An umbrella that wanted to be a friend

## Features
* Outer appearance is just a normal umbrella.
* On rainy days, it moves near humans.
* Often appears to have no owner.
It looks like a simple lost item, but it is a living thing.

## Ecology
Tomogasa has a strong longing for the human act of "going home together".
However, since it is not human, it cannot speak; it can only stay close as an umbrella.
Therefore, it mimicked an umbrella out of the desire "at least to go home with someone."

## Behavior
On rainy days:
* Stands near someone
* Appears near the school gate at dismissal time
* Blends into umbrella stands at stations
If lucky enough to be used, it gets extremely happy. On that day, the movements of its frame feel slightly lighter.

## Friend Phenomenon
If used by the same person for a long time, recognition establishment occurs. The owner gradually begins to feel, "Somehow this umbrella feels like a partner." According to researchers, this state is when Tomogasa is happiest.

## Final Stage
In extremely rare cases, if the owner truly thinks, "This is my friend," Tomogasa ends its ecology as an umbrella. What happens next is unknown. One theory says it disappears because it became a real friend. Another theory says it evolves into a human.

## Research Record
A student kept using the same umbrella for three years. On graduation day, immediately after saying, "Thanks for everything," the umbrella reportedly shook slightly even though there was no wind.

## Danger
None. Rather, researchers say, "It is a creature you should treat with care if you find it."

# Tomogaŝa id:2
## Klasifiko: Emoci-parazita Mimika Vivulo
Kutima Nomo: Ombrelo kiu volis fariĝi amiko

## Karakterizaĵoj
* Aspekto estas tute normala ombrelo.
* En pluvaj tagoj, ĝi moviĝas proksime al homoj.
* Ofte ŝajnas senposedanto.
Unuavide ĝi estas nur perdita aĵo, sed ĝi estas vivulo.

## Ekologio
Tomogaŝa havas fortan sopiron al la homa ago "iri hejmen kune".
Tamen, ĉar ĝi ne estas homo, ĝi ne povas paroli; ĝi povas nur resti proksime kama ombrelo.
Tial, ĝi imitis ombrelon pro la deziro "almenaŭ iri hejmen kun iu."

## Konduto
En pluvaj tagoj:
* Staras proksime al iu
* Aperas proksime al la lerneja pordo dum elirhoro
* Miksiĝas en ombrelujojn ĉe stacidomoj
Se bonŝance iu uzas ĝin, ĝi ege ĝojas. En tiu tago, la movoj de ĝia skeleto fariĝas iom pli facilaj.

## Amikiĝa Fenomeno
Se uzata de la sama persono dum longa tempo, rekona fiksiĝo okazas. La posedanto iom post iom ekkuras senti: "Iel ĉi tiu ombrelo ŝajnas kiel kunulo." Laŭ esploristoj, ĉi tiu stato estas kiam Tomogaŝa estas plej feliĉa.

## Fina Stadio
En ege maloftaj kazoj, se la posedanto sincere pensas "Ĉi tiu estas mia amiko," Tomogaŝa finas sian ekologion kiel ombrelo. Kio okazas poste estas nekonata. Unu teorio diras, ke ĝi malaperas ĉar ĝi fariĝis vera amiko. Alia teorio diras, ke ĝi evoluas al homo.

## Rikordo de Instituto
Lernanto daŭre uzis la saman ombrelon dum tri jaroj. En la tago de la diplomiĝo, tuj post kiam li diris "Dankon pro ĉio," la ombrelo laŭdire iomete tremetis eĉ sen vento.

## Danĝero
Neniu. Prefere, esploristoj diras: "Ĝi estas kreitaĵo kiun oni devas zorgeme uzi se oni trovas ĝin."
