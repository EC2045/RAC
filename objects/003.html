# サミシイシ　id:3
## 分類：鉱物系生物
通称：寂しそうな石ころ

## 特徴
* 見た目は普通の石ころ。
* 道端、公園、河原などによくいる。
* なんとなく寂しそう。
科学的に「寂しそう」を測定する方法は存在しないが、
見るとなんとなく寂しそう
とほぼ全員が証言する。

## 生態
サミシイシは群れで生活したい生物である。
しかし移動速度が極めて遅く、
1年で数ミリ
しか動けない。
そのため仲間に会えず、大体いつもひとりでいる。

## 行動
人間が近くに座ると少し安心する。
長時間そばにいると、
* 少し丸くなる
* 少し温かくなる
* 少し寂しくなさそうになる
などの変化が見られる。

## 習性
サミシイシを二個並べると喜ぶ。
三個並べるともっと喜ぶ。
大量に集めると非常に喜ぶ。
ただし、
「石積みが崩れると全員落ち込む」
ことが知られている。

## 東暦世界での扱い
子どもたちは寂しそうな石を見つけると、
「友達作ってあげよう」
と言って近くに別の石を置く。
大人もだいたい同じことをする。

## 研究所報告
サミシイシAの近くへサミシイシBを配置。
翌年確認したところ、
両個体が0.8mmほど接近していた。
研究員は
「たぶん嬉しかったんだと思う」
と報告している。

## 危険度
なし。
踏んでも普通の石とあまり変わらない。
ただし少し悲しそうになる。
日本のことわざには、
「寂しそうな石を見つけたら隣に座れ」
というものがあるらしい。
意味は特にない。
石が少し嬉しいだけである。

# Samisiisi id:3
## Classification: Mineral lifeform
Common Name: A lonely-looking pebble

## Features
* Looks like a normal pebble.
* Often found on roadsides, parks, or riverbanks.
* Somehow looks lonely.
Although there is no scientific way to measure "loneliness," almost everyone testifies that "it somehow looks lonely when you see it."

## Ecology
Samisiisi is a creature that wants to live in groups. However, its movement speed is extremely slow—only moving a few millimeters a year. Therefore, it cannot meet its peers and is almost always alone.

## Behavior
If a human sits near it, it feels slightly relieved. If you stay beside it for a long time, changes like becoming slightly rounder, warmer, and looking slightly less lonely can be observed.

## Habits
Placing two Samisiisi side by side makes them happy. Placing three makes them even happier. Gathering a large number makes them extremely happy. However, it is known that "if the stone tower collapses, everyone gets depressed."

## Treatment in Toreki World
When children find a lonely-looking stone, they say, "Let's make a friend for it," and place another stone nearby. Adults do mostly the same.

## Research Report
Placed Samisiisi B near Samisiisi A. Checking the following year, both individuals had approached each other by about 0.8mm. The researcher reported, "I think they were probably happy."

## Danger
None. Even if stepped on, it doesn't differ much from a normal stone. However, it looks slightly sad.
There seems to be a Japanese proverb: "If you find a lonely-looking stone, sit next to it." It has no particular meaning. The stone is just slightly happy.

# Samisiisi id:3
## Klasifiko: Minerala vivformo
Kutima Nomo: Soleca ŝtoneto

## Karakterizaĵoj
* Aspektas kiel ordinara ŝtoneto.
* Ofte troviĝas ĉe vojflankoj, en parkoj aŭ riverbordoj.
* Iel aspektas soleca.
Kvankam ne ekzistas scienca metodo por mezuri "solecon," preskaŭ ĉiuj atestas ke "ĝi iel aspektas soleca kiam oni vidas ĝin."

## Ekologio
Samisiisi estas vivulo kiu volas vivi en grupoj. Tamen, ĝia moviĝrapideco estas ege malrapida—nur kelkajn milimetrojn jare. Tial, ĝi ne povas renkonti siajn kunulojn kaj preskaŭ ĉiam estas sola.

## Konduto
Se homo sidas proksime, ĝi sentas sin iom trankviligita. Se oni restas apud ĝi dum longa tempo, estas videblaj ŝanĝoj kaj fariĝi iom pli ronda, pli varma, kaj iom malpli soleca.

## Kutimoj
Meti du Samisiisi flank-al-flanke ĝojigas ilin. Meti tri plie ĝojigas ilin. Kolekti grandan kvanton ege ĝojigas ilin. Tamen, estas konate ke "se la ŝtonamaso falas, ĉiuj deprimas."

## Traktado en Mondo Toreki
Kiam infanoj trovas solecan ŝtonon, ili diras, "Ni faru amikon por ĝi," kaj metas alian ŝtonon proksime. Plenkreskuloj faras preskaŭ la samon.

## Rikordo de Instituto
Metis Samisiisi B proksime al Samisiisi A. Kontrolante la sekvan jaron, ambaŭ individuoj alproksimiĝis je ĉirkaŭ 0,8 mm. La esploristo raportis: "Mi pensas ke ili verŝajne ĝojis."

## Danĝero
Neniu. Eĉ se oni paŝas sur ĝin, ĝi ne multe diferencas de normala ŝtono. Tamen, ĝi aspektas iom malĝoja.
Ŝajne ekzistas japana proverbo: "Se vi trovas solecan ŝtonon, sidu apud ĝi." Ĝi havas neniun apartan signifon. La ŝtono nur iomete ĝojas.
