# ナリソコネルフ id:4
## 分類：擬態失敗生物
通称：ウォーウルフになりきれなかったウォーウルフ

## 特徴
ウォーウルフに憧れた何か。
しかしウォーウルフをよく知らなかったため、再現が少し間違っている。

## 外見
* 狼耳が4本ある
* 尻尾が3本ある
* 狼耳の位置がたまに変わる
* 「わおーん」と言うがあまり狼っぽくない
本人は完璧だと思っている。

## 生態
ナリソコネルフはウォーウルフの集団へ紛れ込もうとする。
しかし、
「なんか違くない？」
と数秒で見抜かれる。

## 行動
ウォーウルフを観察して学習する。
しかし観察能力が低い。
そのため、
ウォーウルフが本を読んでいるのを見て
「なるほど。ウォーウルフは本だ。」
と解釈することがある。
翌日には本を頭に乗せている。

## 会話例
ナリソコネルフ「私は普通のウォーウルフです。」
ウォーウルフ「耳多くない？」
ナリソコネルフ「最近流行っています。」
ウォーウルフ「流行ってない。」

## 研究所報告
ナリソコネルフはウォーウルフへの強い憧れを持つ。
しかし本物のウォーウルフたちは比較的友好的であり、「別にそのままでいいんじゃない？」と言われることが多い。
本人は納得していない。

## 危険度
なし。
たまに耳が増える程度。

# Narisokonerufu id:4
## Classification: Mimicry-failed creature
Common Name: A werewolf that couldn't quite become a werewolf

## Features
Something that admired a warwolf.
However, because it did not know the warwolf well, its reproduction is slightly incorrect.

## Outer Appearance
* Has 4 wolf ears
* Has 3 tails
* The position of the wolf ears changes occasionally
* Says "waoon" but doesn't sound very wolf-like
The creature itself thinks it is perfect.

## Ecology
Narisokonerufu tries to blend into a pack of warwolves.
However, it is exposed in seconds with a "Wait, isn't something different?"

## Behavior
It observes and learns from warwolves.
However, its observation skills are low.
Therefore, seeing a warwolf reading a book, it may interpret, "I see. A warwolf is a book."
The next day, it will have a book on its head.

## Conversation Example
Narisokonerufu: "I am a normal warwolf."
Warwolf: "Don't you have too many ears?"
Narisokonerufu: "It's recently popular."
Warwolf: "It's not."

## Research Report
Narisokonerufu has a strong admiration for warwolves.
However, the real warwolves are relatively friendly, often saying "Well, aren't you fine just the way you are?"
The creature itself is not satisfied.

## Danger
None. At most, its ears increase occasionally.

# Narisokonerufu id:4
## Klasifiko: Malsukcesa mimika kreitaĵo
Kutima Nomo: Lupo-homo kiu ne tute povis fariĝi lupo-homo

## Karakterizaĵoj
Io kio admiris lupo-homon.
Tamen, ĉar ĝi ne bone konis lupo-homon, ĝia reprezento estas iom malĝusta.

## Aspekto
* Havas 4 lupajn orelojn
* Havas 3 vostojn
* La pozicio de la lupaj oreloj foje ŝanĝiĝas
* Krias "ŭaon" sed ne tre lupece
La kreitaĵo mem opinias, ke ĝi estas perfekta.

## Ekologio
Narisokonerufu provas miksiĝi en pakon de lupo-homoj.
Tamen, ĝi estas malkovrita en kelkaj sekundoj kun "Nu, ĉu io ne estas malsama?"

## Konduto
Ĝi observas kaj lernas de lupo-homoj.
Tamen, ĝia observkapablo estas malalta.
Tial, vidante lupo-homon legi libron, ĝi foje interpretas: "Mi komprenas. Lupo-homo estas libro."
La sekvan tagon, ĝi havas libron sur sia kapo.

## Konversacia Ekzemplo
Narisokonerufu: "Mi estas normala lupo-homo."
Lupo-homo: "Ĉu vi ne havas tro da oreloj?"
Narisokonerufu: "Ĝi estas lastatempe populara."
Lupo-homo: "Ne estas."

## Rikordo de Instituto
Narisokonerufu havas fortan admiron al lupo-homoj.
Tamen, la veraj lupo-homoj estas relative amikemaj, ofte dirante: "Nu, ĉu vi ne estas bona tiel, kiel vi estas?"
La kreitaĵo mem ne estas kontenta.

## Danĝero
Neniu. Plejmulte, ĝiaj oreloj foje pliiĝas.
