# バスタブス　id:5
## 分類：交通擬態生物
通称：バスのフリをするバスタブ
![バスのフリをするバスタブ](../images/005.png)

## 特徴
* 見た目は路線バスに似ている。
* しかし中身はほぼバスタブ。
* 「バス」と「バスタブ」を勘違いした結果生まれたと考えられている。

## 外見
遠くから見ると普通のバス。
近づくと、
* 座席がない
* 床にお湯がある
* つり革がアヒルになっている
などの異常が見られる。

## 生態
バスタブスは人を運びたいと思っている。
しかし乗客を乗せると、
「運ぶ前に温めなければ」
と考えてしまう。
そのため車内は常に38～42℃に保たれている。

## 行動
バス停に現れる。
乗客が来るとドアを開ける。
乗客が入る。
湯気が出る。
乗客が出る。
運行終了。

## 会話例
乗客「○○駅まで行きますか？」
バスタブス「ぽこぽこ」
乗客「行かないなこれ」

## 交通局報告
午前8時15分、バスタブスが3番乗り場へ到着。
乗客7名が乗車。
全員が温まった。
誰も目的地には到着しなかった。

## 危険度
低。
ただし急いでいる人には致命的。

## よくある誤解
本物のバスがバスタブスに擬態しているわけではない。
バスタブスが勝手にバスを真似しているだけである。

## 東暦豆知識
バスタブスは褒められると嬉しくなり、
「次こそ人を運べるバスになる」
と決意する。
しかし翌日にはまたお湯を張っている。

# Basutabusu id:5
## Classification: Transit mimicry creature
Common Name: A bathtub pretending to be a bus
![Basutabusu](../images/005.png)

## Features
* Looks similar to a route bus.
* However, the inside is mostly a bathtub.
* Believed to have born as a result of confusing "bus" and "bathtub".

## Outer Appearance
From a distance, it looks like a normal bus.
Approaching it, anomalies are observed:
* No seats
* Hot water on the floor
* Hanging straps shaped like rubber ducks

## Ecology
Basutabusu wants to carry people.
However, once passengers get in, it starts to think:
"I must warm them up before carrying."
Therefore, the inside of the vehicle is always kept at 38–42°C.

## Behavior
Appears at bus stops.
Opens the door when passengers arrive.
Passengers enter.
Steam comes out.
Passengers exit.
Operation finished.

## Conversation Example
Passenger: "Does this go to OO Station?"
Basutabusu: "*bubble bubble*"
Passenger: "I guess it doesn't."

## Transit Authority Report
8:15 AM, Basutabusu arrived at Platform 3.
7 passengers boarded.
Everyone got warmed up.
Nobody arrived at their destination.

## Danger
Low.
However, fatal for people in a hurry.

## Common Misconceptions
It is not that a real bus is mimicking Basutabusu.
Basutabusu is just copying the bus on its own.

## Toreki Trivia
When praised, Basutabusu gets happy and resolves:
"Next time, I will become a bus that can carry people."
However, the next day, it fills itself with hot water again.

# Basutabusu id:5
## Klasifiko: Trafika mimika kreitaĵo
Kutima Nomo: Banujo kiu ŝajnigas esti buso
![Basutabusu](../images/005.png)

## Karakterizaĵoj
* Aspektas simile al linia buso.
* Tamen, la interno estas preskaŭ banujo.
* Oni kredas ke ĝi naskiĝis pro la konfuzo inter "buso" kaj "banujo".

## Aspekto
De malproksime, ĝi aspektas kiel normala buso.
Alproksimiĝante al ĝi, anomalioj estas observataj:
* Neniuj sidlokoj
* Varma akvo sur la planko
* Pendo-teniloj formitaj kiel kaŭĉukaj anasoj

## Ekologio
Basutabusu volas transporti homojn.
Tamen, kiam pasaĝeroj eniras, ĝi ekpensas:
"Mi devas varmigi ilin antaŭ ol transporti."
Tial, la interno de la veturilo ĉiam estas tenata je 38–42 °C.

## Konduto
Aperas ĉe bushaltejoj.
Malfermas la pordon kiam pasaĝeroj alvenas.
Pasaĝeroj eniras.
Vaporo eliras.
Pasaĝeroj eliras.
Operacio finita.

## Konversacia Ekzemplo
Pasaĝero: "Ĉu ĉi tio iras al Stacio OO?"
Basutabusu: "*gurgle gurgle*"
Pasaĝero: "Mi supozas ke ne."

## Raporto de Trafika Oficejo
Je la 8:15 atm, Basutabusu alvenis al kajo 3.
7 pasaĝeroj eniris.
Ĉiuj varmiĝis.
Neniu alvenis al la celo.

## Danĝero
Malalta.
Tamen, mortiga por homoj kiuj hastas.

## Oftaj Miskomprenoj
Ne estas ke vera buso imitas Basutabusu-on.
Basutabusu simple mem imitas la buson.

## Toreki Scioj
Kiam laŭdata, Basutabusu fariĝas feliĉa kaj decidas:
"Venontfoje, mi fariĝos buso kiu povas transporti homojn."
Tamen, la sekvan tagon, ĝi denove plenigas sin per varma akvo.
