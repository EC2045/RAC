# クウキ　id:6
## 分類：擬態生命体生息地：
大気中全域危険度：低～消滅級

## 特徴
* 周囲の空気に擬態する生命体。
* 酸素、窒素、二酸化炭素などの比率を周囲に合わせて変化させる。
* 擬態中は通常の観測手段では発見できない。
* 増殖時には空気そのものを増やすため、大気維持に貢献している。

## 生態
クウキは非常に恥ずかしがり屋であり、危険を感じたり暇になったりすると空気になる。
通常は微弱な意思を持つが、長期間擬態を続けると自我が希薄化していく。

## 完全擬態
クウキ最大の特徴。
周囲の空気と完全に一致した状態になると、
「自分がクウキだった」という情報そのものが失われる。
この状態になると元の個体へ戻れない。
研究者の間では
「死亡なのか進化なのか」
という議論が続いている。

## 東暦世界との関係
現在確認されている東暦世界の大気の約50%はクウキ由来とされる。
つまり東暦世界の住民は一生の半分くらい、
元生物だった何か
を吸い続けていることになる。

## クウキの名言
「暇。」
（観測記録終了）

研究所の報告書だと、
「大気中のクウキ比率が低下すると、クウキが危機感を覚えてさらに空気になるため、結果的に比率が回復する」

# Kuuki id:6
## Classification: Mimicry lifeform
Habitat: Throughout the atmosphere | Danger: Low to Annihilation class

## Features
* A lifeform mimicking the surrounding air.
* Changes the ratio of oxygen, nitrogen, carbon dioxide, etc., to match the surroundings.
* Cannot be detected by normal observation means while mimicking.
* Contributes to atmospheric maintenance by increasing the air itself during proliferation.

## Ecology
Kuuki is extremely shy; when it feels danger or gets bored, it becomes air.
It usually has a faint consciousness, but long-term mimicry dilutes its ego.

## Complete Mimicry
The greatest feature of Kuuki.
When it reaches a state completely identical to the surrounding air:
The information itself that "it was Kuuki" is lost.
Once in this state, it cannot return to its original form.
Among researchers, the debate continues whether this is death or evolution.

## Relationship with Toreki World
About 50% of the atmosphere in the currently confirmed Toreki world is said to originate from Kuuki.
In other words, the residents of the Toreki world breathe "something that used to be a creature" for about half of their lives.

## Kuuki's Quote
"Bored."
(Observation record ends)

## Research Report
"When the ratio of Kuuki in the atmosphere decreases, Kuuki senses danger and becomes more air, resulting in the recovery of the ratio."

# Kuki id:6
## Klasifiko: Mimika vivformo
Habitato: Tra la tuta atmosfero | Danĝero: Malalta ĝis Neniiga klaso

## Karakterizaĵoj
* Vivformo imitanta la ĉirkaŭan aeron.
* Ŝanĝas la proporcion de oksigeno, nitrogeno, karbondioksido, ktp., por kongrui kun la ĉirkaŭaĵo.
* Ne estas detektebla per normalaj observiloj dum imitado.
* Kontribuas al la atmosfera bontenado per pliigo de la aero mem dum reproduktado.

## Ekologio
Kuki estas ege timema; kiam ĝi sentas danĝeron aŭ enuiĝas, ĝi fariĝas aero.
Ĝi kutime havas malfortan konscion, sed longtempa imitado diluas ĝian egon.

## Kompleta Mimiko
La plej granda trajto de Kuki.
Kiam ĝi atingas staton tute identan al la ĉirkaŭa aero:
La informo mem ke "ĝi estis Kuki" perdiĝas.
En ĉi tiu stato, ĝi ne povas reveni al sia origina formo.
Inter esploristoj daŭras la debato ĉu tio estas morto aŭ evoluo.

## Rilato kun Mondo Toreki
Ĉirkaŭ 50% de la atmosfero en la nuntempe konfirmita mondo Toreki devenas de Kuki.
Alivorte, la loĝantoj de la mondo Toreki spiras "ion kio iam estis vivulo" dum ĉirkaŭ duono de sia vivo.

## Citaĵo de Kuki
"Enue."
(Fino de la observa rikordo)

## Raporto de Instituto
"Kiam la proporcio de Kuki en la atmosfero malpliiĝas, Kuki sentas danĝeron kaj fariĝas pli da aero, rezultigante la restarigon de la proporcio."
