# フリドア　 id:7
## 分類：認識干渉型建築擬態
通称：開いてるふりをするドア
![開いてるふりをするドア](https://ec2045.github.io/murinsu/images_ja/開いているふりをするドア.png)

## 概要
フリドアは「開いているように見える」という一点に特化した存在である。<br>
しかし実際には、
どれだけ見ても、どれだけ近づいても、そこは“開いていない”
という矛盾状態にある。

## 特徴
* 視覚的には完全に開放されている
* しかし通過できない
* 近づくほど「開いている確信」が強まる
* 触れると“通った気がする”が、移動していない

## 現象：「次元迷子」
フリドアに接触した者は稀に、
* その場にいるのに別の場所にいる感覚
* 扉の向こうに行った記憶
* すでに通過したという確信
を持つ。
ただし実際には、
どこにも移動していない
というケースがほとんどである。

## 偽装構造
フリドアは単なる物体ではなく、
「開いている」という認識そのものを借りて成立している構造体
である可能性が高い。
そのため、
「開いている」と思った瞬間に強化される。

## 対になる存在
* フリドア（開いてるふり）
* クロズドア（閉じてるふり）<br>
クロズドアは逆に、
「絶対開かない」と思われている時ほど少しだけ開く
という性質を持つ。

## 注意喚起（東暦異常対策本部）
* このドアを「開いている」と認識しないでください<br>
* 不用意な接触は次元迷子を招く恐れがあります（軽度）<br>
* 異常対策本部は基本的に来ません

## 観測記録
ある学生がフリドアを通過したと主張した。
しかしその学生はその後、
* 教室の同じ席に3年間座り続け
* 卒業式の日に「向こう側に行ってた」と発言
* 誰にも理解されなかった

## この世界の解釈
東暦ではフリドアは危険視されていない。<br>
理由：<br>
「通れないドアはただの壁では？」
という結論に毎回なるから。<br>
ただ一部ではこう言われている：<br>
「あれはドアじゃない。“通れると思った記憶”のほうがドアなんだ」

# Furidoa id:7
## Classification: Cognitive interference architectural mimicry
Common Name: A door pretending to be open
![A door pretending to be open](https://ec2045.github.io/murinsu/images_en/opening_looks_like_door.png)

## Overview
Furidoa is an entity specialized in the single point of "appearing to be open".
However, in reality,
No matter how much you look or how close you get, it is "not open"—a state of contradiction.

## Features
* Visually completely open.
* However, cannot be passed through.
* The closer you get, the stronger the "conviction of being open" becomes.
* Touching it gives the feeling that "you passed through," but you haven't moved.

## Phenomenon: "Dimension Lost"
Those who touch Furidoa occasionally experience:
* A feeling of being in a different place despite being right there
* Memories of going to the other side of the door
* A conviction that they have already passed through
However, in reality, in most cases, they have not moved anywhere.

## Mimicry Structure
Furidoa is not a simple object, but highly likely a structure that exists by borrowing the perception itself of "being open".
Therefore, it is reinforced the moment you think "it is open".

## Counterpart
* Furidoa (Pretending to be open)
* Kurozudoa (Pretending to be closed)
Kurozudoa, conversely, has the characteristic of opening slightly more the more it is thought to be "absolutely locked".

## Caution (Toreki Anomaly Response HQ)
* Do not perceive this door as "open".
* Careless contact may cause dimension-lost (mild).
* Anomaly Response HQ basically does not come.

## Observation Record
A student claimed to have passed through Furidoa.
However, that student:
* Sat in the same seat in the classroom for 3 years
* On graduation day, said "I went to the other side"
* Was understood by no one

## Toreki Interpretation
In Toreki, Furidoa is not considered dangerous.
Reason: Every time, they reach the conclusion: "A door that cannot be passed is just a wall, right?"
However, some say:
"That is not a door. The memory of thinking you could pass is the door."

# Furidoa id:7
## Klasifiko: Kogna interfera arkitektura mimiko
Kutima Nomo: Pordo kiu ŝajnigas esti malfermita
![Pordo kiu ŝajnigas esti malfermita](https://ec2045.github.io/murinsu/images_eo/pordo_ŝajniganta_sin_fermita.png)
## Superrigardo
Furidoa estas estaĵo specialiĝinta pri la ununura punkto "ŝajni malfermita".
Tamen, en realeco,
Ne gravas kiom vi rigardas aŭ alproksimiĝas, ĝi estas "ne malfermita"—stato de kontraŭdiro.

## Karakterizaĵoj
* Videble tute malfermita.
* Tamen, ne trapasebla.
* Ju pli vi alproksimiĝas, des pli fortiĝas la "konvinkiĝo de esti malfermita".
* Tuŝi ĝin donas la senton ke "vi trapasis," sed vi ne moviĝis.

## Fenomeno: "Dimensie Perdita"
Tiuj kiuj tuŝas Furidoa-on foje spertas:
* Senton esti en malsama loko malgraŭ esti ĝuste tie
* Memorojn pri iri al la alia flanko de la pordo
* Konvinkiĝon ke ili jam trapasis
Tamen, en realeco, en la plej multaj kazoj, ili moviĝis nenien.

## Pseudo-strukturo
Furidoa ne estas simpla objekto, sed tre verŝajne strukturo kiu ekzistas prunteprenante la percepton mem de "esti malfermita".
Tial, ĝi plifortiĝas en la momento kiam vi pensas "ĝi estas malfermita".

## Kontraŭulo
* Furidoa (Ŝajnigas esti malfermita)
* Kurozudoa (Ŝajnigas esti fermita)
Kurozudoa, male, havas la ecojn malfermiĝi iomete pli ju pli oni pensas ke ĝi estas "absolute ŝlosita".

## Averto (Mondo Toreki Anomalia Respondo HQ)
* Ne perceptu ĉi tiun pordon kiel "malfermita".
* Senatenta kontakto povas kaŭzi dimensie-perditon (milda).
* Anomalia Respondo HQ principe ne venas.

## Rikordo de Observado
Lernanto asertis ke li trapasis Furidoa-on.
Tamen, tiu lernanto:
* Sidis en la sama seĝo en la klasĉambro dum 3 jaroj
* En la tago de la diplomiĝo, diris "Mi iris al la alia flanko"
* Estis komprenita de neniu

## Interpreto de Toreki
En Toreki, Furidoa ne estas konsiderata danĝera.
Kialo: Ĉiufoje, ili atingas la konkludon: "Pordo kiun oni ne povas trapasi estas nur muro, ĉu ne?"
Tamen, iuj diras:
"Tio ne estas pordo. La memoro de pensi ke vi povus trapasi estas la pordo."
