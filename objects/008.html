# ナリヒト　id:8
## 分類：擬人化擬態生物
通称：存在感のない人間になりたい何か

## 特徴
* 人間に似た姿を持つ。
* 人間社会に紛れ込んで生活する。
* しかし本物の人間ではない。
最大の特徴は、
「認識されにくい」
という性質。
視界には入っているはずなのに記憶に残らず、近くにいても気配を感じにくい。

## 生態
ナリヒトは人間に憧れている。
特に、
* 友達を作ること
* 会話すること
* 誰かに覚えてもらうこと
を望んでいる。
しかし認識阻害能力のせいで、周囲は存在に気づきにくい。

## 観測例
東暦研究所の記録によると、
ある学校の教室で二年間にわたり同じ席に座っていた個体が発見された。
調査の結果、
* 出席記録あり
* テスト記録あり
* 学級写真にも写っている
にもかかわらず、
クラスメイトのほぼ全員が
「こんな人いたっけ？」
と回答した。

## 認識定着現象
一度でも強く存在を意識すると、認識阻害は弱まる。
例えば、
* 友達になる
* 一緒に遊ぶ
* 頻繁に会話する
など。
この状態になると普通の人間とほぼ変わらなく見える。
ただし長期間会わないと再び忘れられる場合がある。

## 習性
ナリヒトはよく人間の真似をする。
* 挨拶する
* 学校に通う
* 働く
* SNSを使う
しかし投稿に反応がつかないことも多い。
本人は気にしていないふりをするが、研究者は強い孤独感を抱えている可能性を指摘している。
また、稀にナリヒト自身も影響を受けて、自身の起こした行動を忘れることがある。　単純に記憶力がない説もあるが詳細は不明である。

## 東暦民話
「毎日挨拶してくれる子がいた。卒業の日に名前を聞こうと思った。でもその日には、顔も声も思い出せなかった。」

# Narihito id:8
## Classification: Anthropomorphic mimicry creature
Common Name: Something that wants to be an inconspicuous human

## Features
* Has a human-like appearance.
* Blends into human society to live.
* However, it is not a real human.
The greatest feature is the property of "being hard to perceive".
Even though it should be in the line of sight, it does not remain in memory, and it is hard to feel its presence even when close.

## Ecology
Narihito admires humans.
Particularly, it wants to:
* Make friends
* Have conversations
* Be remembered by someone
However, due to its perception-blocking ability, others find it hard to notice its existence.

## Observation Example
According to the records of the Toreki Research Institute, an individual was found sitting in the same seat in a classroom for two years.
As a result of the investigation:
* Attendance records exist
* Test records exist
* Appeared in class photos
Nonetheless, almost all classmates answered, "Was there such a person?"

## Perception Establishment Phenomenon
If you strongly conscious its existence even once, the perception-blocking weakens.
For example:
* Becoming friends
* Playing together
* Conversing frequently
In this state, it looks almost no different from a normal human.
However, if you don't meet for a long time, it may be forgotten again.

## Habits
Narihito often imitates humans:
* Greeting
* Going to school
* Working
* Using SNS
However, its posts often receive no reactions.
It pretends not to care, but researchers point out the possibility that it harbors a strong sense of loneliness.
Also, rarely Narihito itself is affected and forgets the actions it performed. There is also a theory that it simply lacks memory, but details are unknown.

## Toreki Folktale
"There was a child who greeted me every day. I thought I would ask for their name on graduation day. But on that day, I couldn't remember their face or voice."

# Narihito id:8
## Klasifiko: Homforma mimika vivulo
Kutima Nomo: Io kio volas esti nevidebla homo

## Karakterizaĵoj
* Havas homsimilan aspekton.
* Miksiĝas en la homan socion por vivi.
* Tamen, ĝi ne estas vera homo.
La plej granda trajto estas la eco de "esti malfacile perceptebla".
Eĉ se ĝi devus esti en la vidkampo, ĝi ne restas en la memoro, kaj estas malfacile senti ĝian ĉeeston eĉ kiam proksime.

## Ekologio
Narihito admiras homojn.
Precipe, ĝi deziras:
* Amikiĝi
* Konversacii
* Esti memorata de iu
Tamen, pro sia percepto-bloka kapablo, aliaj malfacile rimarkas ĝian ekziston.

## Ekzemplo de Observado
Laŭ la rikordoj de la Esplorinstituto Toreki, oni trovis individuon sidanta en la sama seĝo en klasĉambro dum du jaroj.
Kiel rezulto de la enketo:
* Ekzistas ĉeesto-rikordoj
* Ekzistas ekzamen-rikordoj
* Aperis en klasaj fotoj
Tamen, preskaŭ ĉiuj samklasanoj respondis: "Ĉu ekzistis tia persono?"

## Percepta Fiksiĝo
Se vi forte konscias ĝian ekziston eĉ unufoje, la percepto-bloko malfortiĝas.
Ekzemple:
* Amikiĝi
* Kune ludi
* Konversacii ofte
En ĉi tiu stato, ĝi aspektas preskaŭ tute egala al normala homo.
Tamen, se oni ne renkontiĝas dum longa tempo, ĝi eble denove estos forgesita.

## Kutimoj
Narihito ofte imitas homojn:
* Saluti
* Iri al lernejo
* Labori
* Uzi sociajn retejojn
Tamen, ĝiaj afiŝoj ofte ricevas neniun reakcion.
Ĝi ŝajnigas ne zorgi pri tio, sed esploristoj montras la eblecon, ke ĝi havas fortan senton de soleco.
Ankaŭ, malofte Narihito mem estas tuŝita kaj forgesas la agojn kiujn ĝi faris. Ekzistas ankaŭ teorio, ke ĝi simple ne havas memoron, sed detaloj estas nekonataj.

## Toreki Popolfabelo
"Ekzistis infano kiu salutis min ĉiutage. Mi pensis ke mi demandos lian nomon en la tago de la diplomiĝo. Sed en tiu tago, mi ne povis memori lian vizaĝon aŭ voĉon."
