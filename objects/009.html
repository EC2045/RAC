# 手.png　id:9 
## 正式分類：自己拡散型概念生命体
通称：無限の連鎖と自己の拡散
![手.png](../images/009.png)

## 概要
手.pngは「存在」というより、
“接続が続いているという感覚そのもの”
で構成される現象である。
そのため、単体として観測することはできない。

## 特徴
* 自己と他者の境界が曖昧になる
* つながっているものがすべて「同一の延長」に見える
* どこまで行っても終点が存在しない
顕微鏡で観察しても、
そこにはさらに小さな“続き”がある
と報告されている。

## 形態（観測例）
最も多い報告は「手の木」と呼ばれる構造。
* 木の枝がすべて手に見える
* その手の指がさらに枝になる
* さらにその先にもまた手がある
拡大しても、
“手であるという構造”だけが延々と続く

## 生態ではなく挙動
手.pngには明確な意思はない。
しかし観測者の認識に対して次の変化を起こす：
* 「これも自分の一部では？」という疑念
* 「どこまでが自分？」という混乱
* 「そもそも区切りが必要？」という消失
最終的には、
境界線という概念が薄れる

## 危険性
物理的危険はない。
しかし長時間観測すると、
* 自己同一性の希薄化
* 記憶の所有者不明化
* 会話中の主語崩壊
などが発生する。
例：「私は昨日の私であり、あなたでもある昨日の私です」

## 研究所報告
手.pngを長時間観測した研究員Aは、研究記録にこう書いた。
「これは私の観測ではなく、観測そのものが私を含んでいる」
その後、記録は途中で途切れている。

## 通称の意味
「無限の連鎖と自己の拡散」は誤訳ではなく、
どこからどこまでが“翻訳”なのか不明
という理由でそのまま採用されている。

## 東暦世界での扱い
一般的にはこう言われる：
「あれは見ないほうがいい。見たことになるから」

# Hand.png id:9
## Classification: Self-spreading conceptual lifeform
Common Name: Infinite chain and diffusion of self
![hand](../images/009.png)

## Overview
Te.png is not so much an "existence" as a phenomenon composed of the "feeling itself that connection continues."
Therefore, it cannot be observed as a single entity.

## Features
* Boundaries between self and others become ambiguous.
* Everything connected looks like "the same extension."
* No matter how far you go, no endpoint exists.
It is reported that even when observed under a microscope, there is a further, smaller "continuation" there.

## Form (Observation Example)
The most common report is a structure called the "Hand Tree":
* All branches of the tree look like hands.
* The fingers of those hands further become branches.
* There are hands again at the tips of those branches.
Even when magnified, only the structure of "being a hand" continues endlessly.

## Behavior, Not Ecology
Te.png has no clear intention.
However, it causes the following changes in the observer's perception:
* Suspicion: "Is this also a part of me?"
* Confusion: "Where do I end?"
* Dissolution: "Do we even need boundaries?"
Eventually, the concept of boundaries fades.

## Danger
No physical danger.
However, prolonged observation causes:
* Dilution of self-identity
* Anonymity of memory ownership
* Collapse of pronouns during conversation
Example: "I am yesterday's me, and I am also yesterday's me who is you."

## Research Report
Researcher A, who observed Te.png for a long time, wrote in the research log:
"This is not my observation; the observation itself includes me."
After this, the log cuts off.

## Common Meaning
"Infinite chain and diffusion of self" is not a mistranslation, but was adopted because it is unknown from where to where the "translation" is.

## Treatment in Toreki World
Generally said: "It is better not to look at that. Because it means you've looked."

# Mano.png id:9
## Klasifiko: Mem-disvastiĝanta koncepta vivformo
Kutima Nomo: Senfina ĉeno kaj difuzo de la memo
![mano](../images/009.png)

## Superrigardo
Mano.png ne estas tiom "ekzisto" kiom fenomeno konsistanta el la "sento mem ke konekto daŭras."
Tial, ĝi ne povas esti observata kiel ununura unuo.

## Karakterizaĵoj
* Limoj inter memo kaj aliaj fariĝas ambiguaj.
* Ĉio konektita aspektas kiel "la sama etendaĵo."
* Ne gravas kiom for vi iras, neniu finpunkto ekzistas.
Oni raportas ke eĉ kiam observata sub mikroskopo, estas plia, pli malgranda "daŭrigo" tie.

## Formo (Ekzemplo de Observado)
La plej ofta raporto estas strukturo nomata "Mana Arbo":
* Ĉiuj branĉoj de la arbo aspektas kiel manoj.
* La fingroj de tiuj manoj plie fariĝas branĉoj.
* Estas manoj denove ĉe la pintoj de tiuj branĉoj.
Eĉ kiam pligrandigita, nur la strukturo de "esti mano" daŭras senfine.

## Konduto, Ne Ekologio
Mano.png havas neniun klaran intencon.
Tamen, ĝi kaŭzas la sekvajn ŝanĝojn en la percepto de la observanto:
* Dubo: "Ĉu ĉi tio ankaŭ estas parto de mi?"
* Konfuzo: "Kie mi finiĝas?"
* Dissolvo: "Ĉu ni entute bezonas limojn?"
Poste, la koncepto de limoj velkas.

## Danĝero
Neniu fizika danĝero.
Tamen, longdaŭra observado kaŭzas:
* Diluon de la mem-identeco
* Anonimecon de memorposedo
* Kolapson de pronomoj dum konversacio
Ekzemplo: "Mi estas la hieraŭa mi, kaj mi estas ankaŭ la hieraŭa mi kiu estas vi."

## Rikordo de Instituto
Esploristo A, kiu observis Mano.png dum longa tempo, skribis en la esplorrikordo:
"Ĉi tio ne estas mia observado; la observado mem inkluzivas min."
Post tio, la rikordo ĉerpas.

## Signifo de la Nomo
"Senfina ĉeno kaj difuzo de la memo" ne estas mistraduko, sed estis adoptita ĉar estas nekonate de kie ĝis kie la "traduko" estas.

## Traktado en Mondo Toreki
Ĝenerale dirite: "Pli bone estas ne rigardi tion. Ĉar tio signifas ke vi rigardis."
