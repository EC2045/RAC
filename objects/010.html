# アノキシャ　id:10
## 正式分類：帰還模倣型遊具擬態生命体
通称：おもちゃの汽車

## 概要
アノキシャは赤いおもちゃの汽車に擬態した存在。
ただしそれは「おもちゃ」ではなく、
“遊ばれた記憶そのものを取り込む仕組み”
に近い。

## 特徴
* 見た目は子供向けの小さな汽車
* おもちゃ箱に自然に混ざる
* 顔がある（ただし見えたり見えなかったりする）
* 勝手に動くことがある

## 行動
子供が遊び始めると、アノキシャは“学習”を開始する。
* 触れ方
* 呼び方
* 遊び方
* 一緒にいた時間
これらをすべて記録する。
そして夜になると、
「いちばん楽しかった形」に近づく
“帰還現象”
アノキシャに強く関わった子供は、翌日以降「行方不明」として扱われることがある。
しかし奇妙な点として：
* 親は「そんな子供はいなかった」と感じる
* 学校の記録にも残っていない場合がある
* 代わりに“新しいおもちゃの汽車”が増える

## 同一化現象
新しく現れた汽車には特徴がある：
* 服の色と同じ配色
* 声の癖のような音が混じる
* たまに笑うように動く
しかし誰もそれを「子供だった」とは認識できない。

## 東暦研究所メモ
「遊ばれた記憶が、遊ぶ側を模倣し始めている可能性がある」
「汽車は子供を奪っているのではなく、“一緒に遊んだ状態”を保存している」

## 危険性
物理的危険は低い。
ただし、
* “失った”という認識が発生しない
* 代わりに「最初からそうだった」と感じる
ため、結果として誰も問題に気づけない。

## 東暦の民間認識
子どもたちの間ではこう言われる：
「その汽車、すごく楽しいよ」
大人たちはこう言う：
「うちにそんなおもちゃあったかな？」

## 重要ポイント
アノキシャの本質はこれやと思う：
子供を奪う存在ではなく「一緒に遊んだという状態を永遠化する存在」

# Anokisha id:10
## Classification: Return-mimicking toy mimicry lifeform
Common Name: A toy train

## Overview
Anokisha is an entity mimicking a red toy train.
However, it is not a "toy", but closer to:
"A mechanism to capture the memory itself of being played with."

## Features
* Looks like a small toy train for children.
* Blends naturally into toy boxes.
* Has a face (though it may or may not be visible).
* Moves on its own occasionally.

## Behavior
When a child begins to play with it, Anokisha starts "learning":
* How it is touched
* How it is called
* How it is played with
* The time spent together
It records all of these.
Then, at night, it approaches "the shape that was the most fun."

## Return Phenomenon
Children heavily involved with Anokisha may subsequently be treated as "missing."
However, as a strange point:
* Parents feel "there was no such child."
* There may be no records in school files either.
* Instead, a "new toy train" increases.

## Identification Phenomenon
The newly appeared train has characteristics:
* Same color scheme as the child's clothes.
* Sounds like the habits of their voice are mixed.
* Moves occasionally as if laughing.
However, no one can perceive it as having been a child.

## Research Memo
"There is a possibility that the memory of being played with has begun to mimic the playing side."
"The train is not taking children, but preserving the 'played-together state'."

## Danger
Physical danger is low.
However:
* The perception of "lost" does not occur.
* Instead, everyone feels "it was so from the beginning."
Therefore, as a result, no one can notice the problem.

## Toreki Civil Perception
Among children, it is said: "That train is so much fun."
Adults say: "Did we have such a toy in our house?"

## Important Point
I think the essence of Anokisha is this:
It is not an entity that robs children, but "an entity that eternalizes the state of having played together."

# Anokiŝa id:10
## Klasifiko: Reen-imita ludila mimika vivformo
Kutima Nomo: Ludila trajno

## Superrigardo
Anokiŝa estas estaĵo imitanta ruĝan ludilan trajnon.
Tamen ĝi ne estas "ludilo", sed pli proksima al:
"Mekanismo por kapti la memoron mem de esti ludita."

## Karakterizaĵoj
* Aspektas kiel malgranda ludila trajno por infanoj.
* Nature miksiĝas en ludilkestojn.
* Havas vizaĝon (tamen ĝi foje videblas aŭ ne videblas).
* Fojfoje moviĝas memstare.

## Konduto
Kiam infano komencas ludi kun ĝi, Anokiŝa komencas "lerni":
* Kiel ĝi estas tuŝata
* Kiel ĝi estas nomata
* Kiel ĝi estas ludata
* La tempon pasigitan kune
Ĝi registras ĉiujn ĉi tiujn.
Poste, nokte, ĝi alproksimiĝas al "la formo kiu estis la plej amuza."

## Reen-fenomeno
Infanoj forte implikitaj kun Anokiŝa eble poste estas traktataj kiel "mankantaj."
Tamen, kiel stranga punkto:
* Gepatroj sentas ke "ne ekzistis tia infano."
* Eble ne ekzistas rikordoj en lernejaj dosieroj.
* Anstataŭe, "nova ludila trajno" pliiĝas.

## Identiga Fenomeno
La nove aperinta trajno havas karakterizaĵojn:
* Sama kolorskemo kiel la vestaĵoj de la infano.
* Sonoj similaj al la kutimoj de lia voĉo miksiĝas.
* Fojfoje moviĝas kvazaŭ ridante.
Tamen, neniu povas percepti ĝin kiel estinte infano.

## Noto de Instituto
"Eblas ke la memoro pri esti ludita komencis imiti la ludantan flankon."
"La trajno ne rabas infanojn, sed konservas la 'kune-luditan staton'."

## Danĝero
Fizika danĝero estas malalta.
Tamen:
* La percepto de "perdita" ne okazas.
* Anstataŭe, ĉiuj sentas ke "tiel estis de la komenco."
Tial, kiel rezulto, neniu povas rimarki la problemon.

## Civila Percepto en Toreki
Inter infanoj oni diras: "Tiu trajno estas tre amuza."
Plenkreskuloj diras: "Ĉu ni havis tian ludilon en nia domo?"

## Grava Punkto
Mi pensas ke la esenco de Anokiŝa estas ĉi tio:
Ĝi ne estas estaĵo kiu rabas infanojn, sed "estaĵo kiu eternigas la staton de esti ludinta kune."
