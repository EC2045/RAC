# ワスレグルミ　id:11
## 正式分類：記憶依存型自律繊維生命体
通称：忘れられたぬいぐるみ
![ワスレグルミ](../images/011.png)

## 概要
ワスレグルミは、
「忘れられた」という状態に反応して発生する存在
である。
棚の奥や押し入れの隙間など、人間の記憶から少し外れた場所に多く現れる。

## 特徴
* 見た目は普通のぬいぐるみ
* しかし時間経過で微弱な意思が宿る
* 目が合うとわずかに動くことがある
* しかし基本的には静か

## 行動
ワスレグルミは攻撃性を持たない。
むしろその逆で、
「思い出してもらうこと」だけを目的として動く

## 再接触現象
かつて持ち主だった子供の前に、自然な形で再出現することがある。
* 部屋の隅に座っている
* 机の上にいる
* 夢の中にいる
ただし重要なのは、
「怖がられないように出てくる」
という点である。

## 拒絶後の変化
もし再会後も無視され、さらに廃棄・破棄された場合、
ワスレグルミは「最後の記録」を残す。
翌日以降、
* “ぬいぐるみの形をした何か”が現れる
* 材質は元のものと一致しない場合がある
* 持ち主の記憶と一致する特徴が混ざる
※ここで東暦研究所は記録を曖昧にしている：
「それは本当に“作られた”のか、“思い出された結果”なのか不明」

## 民間伝承
東暦ではこう言われる：
「ぬいぐるみは最後まで大切にしなさい」
ただし理由は語られない。
子供には単にこう説明される：
「かわいそうだから」

## 実際の本質（研究仮説）
ワスレグルミは「物」ではなく、
“思い出されなくなった関係性の残留構造”
である可能性が高い。

## 危険性
通常は無害。
ただし例外として、
* 長期間放置
* 強い拒絶
* 意図的な破棄
が重なると、
「関係性そのもの」が再構成される可能性がある。

## 東暦研究所メモ
「これは罰ではなく、修復である可能性がある」
「ただし修復後の形が人間にとって理解可能かは不明」

## 東暦世界での扱い
大人も子供も特に深く考えないが、
ぬいぐるみを捨てるときだけは少し静かになる。

# Wasuregurumi id:11
## Classification: Memory-dependent autonomous fibrous lifeform
Common Name: The forgotten stuffed animal
![Wasuregurumi](../images/011.png)

## Overview
Wasuregurumi is an entity that arises in response to the state of being "forgotten".
They often appear in places slightly out of human memory, such as the back of shelves or gaps in closets.

## Features
* Looks like a normal stuffed animal.
* However, a faint will dwells inside over time.
* May move slightly when eyes meet.
* However, basically quiet.

## Behavior
Wasuregurumi has no aggressiveness.
Rather, it is the opposite:
It acts solely for the purpose of "being remembered".

## Re-contact Phenomenon
It may reappear in a natural way before the child who was once its owner:
* Sitting in a corner of the room
* On the desk
* In a dream
However, the important point is:
"It comes out in a way that doesn't scare the owner."

## Change After Rejection
If ignored even after reunion, and discarded or destroyed, Wasuregurumi leaves a "final record."
From the next day:
* "Something shaped like a stuffed animal" appears.
* The material may not match the original.
* Features matching the owner's memories are mixed.
Here, Toreki Research Institute keeps the record ambiguous:
"It is unknown whether it was 'created' or 'as a result of being remembered'."

## Folklore
In Toreki, it is said: "Keep your stuffed animals safe until the end."
However, the reason is not told.
Children are simply explained: "Because they are pitiful."

## Real Essence (Research Hypothesis)
Wasuregurumi is highly likely not an "object," but:
"The residual structure of a relationship that is no longer remembered."

## Danger
Normally harmless.
However, as exceptions, if:
* Long-term neglect
* Strong rejection
* Intentional discarding
overlap, "the relationship itself" may be reconstructed.

## Research Memo
"This may not be a punishment, but a restoration."
"However, it is unknown whether the shape after restoration is understandable to humans."

## Treatment in Toreki World
Both adults and children do not think deeply about it, but they become slightly quiet only when discarding stuffed animals.

# Vasuregurumi id:11
## Klasifiko: Memor-dependa sendependa fibra vivformo
Kutima Nomo: Forgesita ludbesto
![Vasuregurumi](../images/011.png)

## Superrigardo
Vasuregurumi estas estaĵo kiu aperas responde al la stato de esti "forgesita".
Ili ofte aperas en lokoj iomete ekster la homa memoro, kiel la profundo de bretoj aŭ fendoj en ŝrankoj.

## Karakterizaĵoj
* Aspektas kiel normala ludbesto.
* Tamen, malforta volo ekloĝas interne kun la paso de la tempo.
* Eble moviĝas iomete kiam la okuloj renkontiĝas.
* Tamen, principe kvieta.

## Konduto
Vasuregurumi havas neniun agresemon.
Prefere, estas la malo:
Ĝi agas nur por la celo "esti memorata".

## Re-kontakta Fenomeno
Ĝi eble reaperos en natura maniero antaŭ la infano kiu iam estis ĝia posedanto:
* Sidante en angulo de la ĉambro
* Sur la skribotablo
* En sonĝo
Tamen, la grava punkto estas:
"Ĝi aperas en maniero kiu ne timigas la posedanton."

## Ŝanĝo Post Malakcepto
Se ignorite eĉ post reunuiĝo, kaj forĵetite aŭ detruite, Vasuregurumi lasas "finan rikordon."
De la sekva tago:
* "Io formita kiel ludbesto" aperas.
* La materialo eble ne kongruas kun la originala.
* Trajtoj kongruaj kun la memoroj de la posedanto miksiĝas.
Ĉi tie, Esplorinstituto Toreki tenas la rikordon ambigua:
"Estas nekonate ĉu ĝi estis 'kreita' aŭ 'kiel rezulto de esti memorita'."

## Popola Tradicio
En Toreki oni diras: "Zorgu pri viaj ludbestoj ĝis la fino."
Tamen, la kialo ne estas dirita.
Al infanoj oni simple klarigas: "Ĉar ili estas kompatindaj."

## Reala Esenco (Esplora Hipotezo)
Vasuregurumi estas tre verŝajne ne "objekto," sed:
"La resta strukturo de rilato kiu ne plu estas memorata."

## Danĝero
Kutime sendanĝera.
Tamen, kiel esceptoj, se:
* Longdaŭra neglekto
* Forta malakcepto
* Intenca forĵeto
interkovriĝas, "la rilato mem" povas esti rekonstruita.

## Noto de Instituto
"Ĉi tio eble ne estas puno, sed restarigo."
"Tamen, estas nekonate ĉu la formo post restarigo estas komprenebla por homoj."

## Traktado en Mondo Toreki
Kaj plenkreskuloj kaj infanoj ne pensas profunde pri tio, sed ili fariĝas iom silentaj nur kiam ili forĵetas ludbestojn.
