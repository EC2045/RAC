# 壁を走るな　id:13
## 正式分類：重力規律干渉型指示概念
通称：垂直方向への規律

## 概要
「壁を走るな」は単なる注意書きではない。
それは、
“人間がどの方向を移動として許可されているか”
を定義する社会的ルールである。

## 特徴
* 水平方向の移動は許可されている
* 垂直方向の連続移動は「走る」として禁止される
* 壁は本来“移動可能な面”であるが、社会的に封印されている
* ポスターとして各所に自然発生する

## 現象
一部の観測では、
子どもが壁に向かって走り出した瞬間、
* 重力の解釈が一瞬揺れる
* 視線が「床基準」に固定される
* 移動の定義が再調整される
という現象が確認されている。

## ポスターの役割
「壁を走るな」という文は命令ではなく、
“現実の整合性を保つための固定具”
である。
つまりこれは禁止ではなく、
「この世界はこういうルールで安定していますよ」
という宣言に近い。

## 規律の本質
研究者の間ではこう解釈されている：
壁を走ることが危険なのではなく“壁を走れる可能性を認識してしまうこと”が問題

## 観測例
ある施設でポスターが剥がされた直後、
* 子ども数名が壁に向かって走る素振りを見せた
* しかしすぐに「やっぱ無理だよね」と言った
* その後ポスターは翌日自然に戻っていた

## 危険性
中。
ただし長時間この概念に触れると、
* 床と壁の区別が曖昧になる
* 移動の“基準面”が揺れる
* 立っている感覚が不安定になる

## この世界での扱い
大人：
「壁は走るもんじゃない」
子ども：
「走れないの？」
研究者：
「走れない理由が後付けされている可能性がある」

## 補足
一部地域では逆に、
「壁を走らないでください」
ではなく
「床から離れないでください」
と書かれている場所もある。

## 結論
「壁を走るな」とは、
重力を守るための命令ではなく“重力という共通幻想を維持するための合意”
である。

# Do Not Run on Walls id:13
## Classification: Gravitational discipline interference instruction concept
Common Name: Discipline towards the vertical direction

## Overview
"Do not run on walls" is not a simple warning.
It is a social rule that defines:
"In which direction humans are permitted to move."

## Features
* Horizontal movement is permitted.
* Vertical continuous movement is prohibited as "running".
* Walls are originally "movable surfaces," but are socially sealed.
* Posters naturally generate in various places.

## Phenomenon
In some observations, the moment a child starts running towards a wall:
* The interpretation of gravity sways for an instant.
* The gaze is fixed to "floor reference."
* The definition of movement is readjusted.

## Poster's Role
The sentence "Do not run on walls" is not a command, but:
"A fixture to maintain the consistency of reality."
In other words, this is not a prohibition, but closer to a declaration:
"This world is stable under these rules."

## Discipline's Essence
Among researchers, it is interpreted:
It is not that running on walls is dangerous, but "recognizing the possibility that you can run on walls" is the problem.

## Observation Example
Immediately after a poster was peeled off in a facility:
* Several children made gestures of running towards the wall.
* However, they immediately said, "No, it's impossible after all."
* The poster naturally returned the next day.

## Danger
Medium.
However, prolonged contact with this concept:
* Ambiguates the distinction between floor and wall.
* Sways the "reference plane" of movement.
* Instabilizes the feeling of standing.

## Treatment in Toreki World
Adult: "Walls are not for running."
Child: "We can't run?"
Researcher: "There is a possibility that the reason you can't run is retrofitted."

## Supplement
In some regions, conversely:
Instead of "Do not run on walls", it is written as "Do not leave the floor."

## Conclusion
"Do not run on walls" is:
Not a command to obey gravity, but "an agreement to maintain the shared illusion called gravity."

# Ne Kuru sur Muroj id:13
## Klasifiko: Gravita disciplina interfera instrukcia koncepto
Kutima Nomo: Disciplino al vertikala direkto

## Superrigardo
"Ne kuru sur muroj" ne estas simpla averto.
Ĝi estas socia regulo kiu difinas:
"En kiu direkto homoj estas permesitaj moviĝi."

## Karakterizaĵoj
* Horizontala movado estas permesita.
* Vertikala kontinua movado estas malpermesita kiel "kurado".
* Muroj estas origine "moveblaj surfacoj," sed estas socie sigelitaj.
* Afiŝoj nature aperas en diversaj lokoj.

## Fenomeno
En kelkaj observadoj, la momenton kiam infano ekkuras al muro:
* La interpreto de gravito ŝanceliĝas por momento.
* La rigardo estas fiksita al la "planka referenco."
* La difino de movado estas reĝustigita.

## Rolo de la Afiŝo
La frazo "Ne kuru sur muroj" ne estas ordono, sed:
"Fiksilo por subteni la koherecon de la realo."
Alivorte, ĉi tio ne estas malpermeso, sed pli proksima al deklaro:
"Ĉi tiu mondo estas stabila sub ĉi tiuj reguloj."

## Esenco de la Disciplino
Inter esploristoj oni interpretas:
Ne estas ke kuri sur muroj estas danĝere, sed "rimarki la eblecon ke vi povas kuri sur muroj" estas la problemo.

## Ekzemplo de Observado
Tuj post kiam afiŝo estis deŝirita en institucio:
* Kelkaj infanoj faris gestojn de kurado al la muro.
* Tamen, ili tuj diris: "Ne, ĝi estas neebla finfine."
* La afiŝo nature revenis la sekvan tagon.

## Danĝero
Meza.
Tamen, longdaŭra kontakto kun ĉi tiu koncepto:
* Fariĝas la distingo inter planko kaj muro ambigua.
* Ŝancelas la "referencan ebenon" de movado.
* Malstabiligas la senton de starado.

## Traktado en Mondo Toreki
Plenkreskulo: "Muroj ne estas por kuri."
Infano: "Ĉu ni ne povas kuri?"
Esploristo: "Eblas ke la kialo kial oni ne povas kuri estas postkorektita."

## Aldono
En kelkaj regionoj, kontraŭe:
Anstataŭ "Ne kuru sur muroj", estas skribite "Ne forlasu la plankon."

## Konkludo
"Ne kuru sur muroj" estas:
Ne ordono obei graviton, sed "interkonsento por subteni la komunan iluzion nomatan gravito."
