# たんぼのなかの田中さん　id:14
## 正式分類：局所存在固定型人物現象
通称：たんぼのなかの田中さん
![たんぼのなかの田中さん](../images/014.png)

## 概要
たんぼのなかの田中さんは、
「たんぼのなかにいる田中さん」
である。
それ以上でもそれ以下でもない。

## 特徴
* たんぼのなかにいる
* 名前は田中さん
* だいたい青いポロシャツ、日本人っぽい見た目
* 話しかけると普通に返事する

## 奇妙な点
たんぼのなかの田中さんは、どの地域でも発見される。
しかし調査すると、以下のケースが非常に多い：
* 戸籍に存在しない
* 農地所有者でもない
* 近所の人も知らない

## 行動
基本的に田んぼの様子を見ている。
たまに、
「今年は良さそうですねぇ」
と言う。
しかし何が良いのか聞くと、
「そうですねぇ」
と答える。

## 存在固定現象
田中さんを田んぼの外へ連れ出そうとすると、気付けば再び田んぼの中にいる。
研究所による実験では、
* 軽トラック
* バス
* ヘリコプター
が試されたが、結果は全て同じだった。

## 研究所報告
午前10時。
田中さんを研究所へ移送。

午前11時。
研究所職員が窓の外を見る。

田中さんが田んぼの中にいた。

なお、研究所周辺に田んぼは存在しない。

## 危険性
なし。むしろ親切。
道を聞けば教えてくれる。
ただし、
「ここどこですか？」
と聞くと、
「多分たんぼだと思いますねぇ」
としか答えない。

##　この世界での扱い
* **子供：** 「田中さんだ！」
* **大人：** 「田中さんだな」
* **研究者：** 「なぜ田中さんなのか」
* **田中さん：** 「田中ですから」

## 補足
ごく稀に、田んぼの中にいるにもかかわらず、
「私は田中ではありません」
と主張する個体が発見される。
その場合は、
「たんぼのなかの田中さんではない田中さん」
として別分類される。

# Tanaka-san in the Rice Paddy id:14
## Classification: Locally-fixed Humanoid Phenomenon
Common Name: Tanaka-san in the Rice Paddy
![Tanaka-san in the Rice Paddy](../images/014.png)

## Overview
Tanaka-san in the Rice Paddy is simply:
"Tanaka-san, who is in the rice paddy."
Nothing more, nothing less.

## Features
* Located inside a rice paddy.
* His name is Tanaka-san.
* Usually wears a blue polo shirt; looks like a typical Japanese man.
* Replies normally when spoken to.

## Strange Points
Tanaka-san in the Rice Paddy can be found in any region.
However, upon investigation, the following are highly common:
* He has no family register (koseki).
* He is not the landowner of the farmland.
* Neighborhood residents have no idea who he is.

## Behavior
He basically just watches over the rice paddy.
Occasionally, he says:
"Looks good this year, doesn't it?"
However, if asked *what* is good, he only replies:
"Yes, indeed."

## Presence Fixation Phenomenon
If one attempts to take Tanaka-san out of the rice paddy, he is inevitably found back inside the paddy before anyone notices.
In experiments conducted by the Institute, the following transportation methods were tested:
* Light truck
* Bus
* Helicopter
However, the results were all identical.

## Toreki Research Institute Report
10:00 AM.
Tanaka-san was transported to the research facility.

11:00 AM.
An institute staff member looked out the window.

Tanaka-san was standing in the middle of a rice paddy.

Note: No rice paddies exist anywhere near the institute.

## Danger
None. In fact, he is quite kind.
If you ask for directions, he will tell you.
However, if you ask:
"Where is this place?"
He only answers:
"I believe it is probably a rice paddy."

## Treatment in Toreki World
* **Children:** "It's Tanaka-san!"
* **Adults:** "Ah, it's Tanaka-san."
* **Researchers:** "Why is he Tanaka-san?"
* **Tanaka-san:** "Because I am Tanaka."

## Addendum
On extremely rare occasions, an individual is discovered who, despite being in the rice paddy, claims:
"I am not Tanaka."
In such cases, they are classified separately as:
"The Tanaka-san who is not the Tanaka-san in the Rice Paddy."

# Tanaka-san en la Ricejo id:14
## Klasifiko: Loke fiksita homoida fenomeno
Kutima Nomo: Tanaka-san en la ricejo
![Tanaka-san en la Ricejo](../images/014.png)

## Superrigardo
Tanaka-san en la ricejo estas simple:
"Sinjoro Tanaka, kiu estas en la ricejo."
Nek pli, nek malpli.

## Karakterizaĵoj
* Troviĝas meze de ricejo.
* Lia nomo estas Tanaka-san (Sinjoro Tanaka).
* Plej ofte portas bluan poloon; aspektas kiel tipa japana viro.
* Respondas normale kiam oni parolas al li.

## Strangaj Punktoj
Tanaka-san en la ricejo estas trovebla en iu ajn regiono.
Tamen, post esploro, la sekvaj punktoj estas tre oftaj:
* Li ne ekzistas en la civila registro (koseki).
* Li ne estas la posedanto de la kamparo.
* La najbaroj tute ne konas lin.

## Konduto
Li principe nur observas la staton de la ricejo.
Kelkafoje li diras:
"Aspektas bone ĉi-jare, ĉu ne?"
Tamen, se oni demandas al li *kio* estas bona, li nur respondas:
"Jes, ja."

## Ĉeesto-Fiksa Fenomeno
Se oni provas elkonduki Tanaka-san el la ricejo, oni trovas lin denove meze de la ricejo antaŭ ol iu rimarkas.
En eksperimentoj faritaj de la Instituto, la sekvaj transportiloj estis provitaj:
* Kamioneto
* Buso
* Helikoptero
Tamen, la rezultoj estis tute samaj.

## Raporto de Instituto Toreki
Je la 10-a horo matene.
Tanaka-san estis transportita al la esplorcentro.

Je la 11-a horo matene.
Kunlaboranto de la instituto rigardis ekster la fenestron.

Tanaka-san estis meze de ricejo.

Rimarko: Neniu ricejo ekzistas proksime de la instituto.

## Danĝero
Neniu. Prefere li estas helpema.
Se oni demandas pri la vojo, li gvidos vin.
Tamen, se oni demandas:
"Kie estas ĉi tie?"
Li nur respondas:
"Verŝajne estas ricejo, mi pensas."

## Traktado en Mondo Toreki
* **Infanoj:** "Jen Tanaka-san!"
* **Plenkreskuloj:** "Tio estas Tanaka-san."
* **Esploristoj:** "Kial ĝuste Tanaka-san?"
* **Tanaka-san:** "Ĉar mi estas Tanaka."

## Aldono
Tre malofte, oni malkovras individon kiu, malgraŭ ke li estas en la ricejo, asertas:
"Mi ne estas Tanaka."
En tiu kazo, li estas klasifikita aparte kiel:
"La Tanaka-san kiu ne estas la Tanaka-san en la Ricejo."
