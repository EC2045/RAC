# あの世の使者　id:16
## 正式分類：境界伝達型存在
通称：あの世の使者
![あの世の使者](../images/016.png)

## 概要
あの世の使者は、
「あの世から来た」とされる存在
である。
ただし、本当にあの世から来たのか、そもそもあの世が存在するのかは確認されていない。

## 特徴
* 人型として目撃されることが多い
* 個体ごとに姿が異なる
* 目撃者によって外見の証言が一致しない
* どこから来たのか分からない

## 行動
あの世の使者は突然現れる。
そして短い言葉を残す。

**【残される言葉の例】**
* 「まだです」
* 「忘れ物があります」
* 「その道ではありません」
* 「また後で」

その後、自然にいなくなる。

## 伝達現象
使者の言葉は、その場では意味不明なことが多い。
しかし後になってから、
「あの時のことだったのか」
と解釈される場合がある。

## 誤解
一般には「死神」と誤解されることが多い。
しかし研究記録では、使者が現れた人物の大半はそのまま普通に生活している。

## 東暦研究所の見解
研究所は、
「あの世へ連れていく存在ではなく、境界について知らせる存在」
という仮説を採用している。

## 観測記録
ある人物が深夜の交差点で個体を目撃。
個体は一言、
「まだ早いです」
と告げた。

数年後、その人物は同じ交差点で大事故を回避した。
本人は「あれのことだったのかもしれない」と語っている。

## 危険性
**低**
直接的な危害は確認されていない。
ただし、以下の精神的影響が報告されている：
* 不安になる
* 妙に言葉が気になる
* 数年間忘れられなくなる

## 東暦世界での扱い
* **一般人：** 「縁起悪いなぁ」
* **研究者：** 「また境界事例か」
* **子供：** 「使者さんだ！」
* **使者：** 「違います」

## 備考
「あの世の使者」という名称は通称であり、当の本人に名称を尋ねても、
「そう呼ばれているようですね」
としか答えない。
そのため、本当に“あの世の使者”なのかは現在も不明である。

# Messenger from the Underworld id:16
## Classification: Boundary-transmitting Entity
Common Name: Messenger from the Underworld
![Messenger from the Underworld](../images/016.png)

## Overview
The Messenger from the Underworld is an entity said to have "come from the afterlife."
However, whether they truly came from the afterlife, or if the afterlife even exists, remains unconfirmed.

## Features
* Frequently sighted in humanoid forms.
* Appearance varies significantly with each individual entity.
* Accounts of their appearance from eyewitnesses do not match.
* Origin is completely unknown.

## Behavior
The Messenger from the Underworld appears abruptly, leaves a brief message, and then vanishes naturally.

**【Examples of left messages】**
* "Not yet."
* "You have forgotten something."
* "That is not the way."
* "See you later."

## Transmission Phenomenon
The messenger's words are often nonsensical or cryptic in the moment.
However, much later on, the recipient may suddenly realize and interpret:
"Ah, so that's what they meant back then."

## Misconception
They are commonly misunderstood by the public as the "Grim Reaper."
However, research records show that the majority of people encountered by these messengers continue to live their normal daily lives.

## Toreki Research Institute's View
The institute adopts the hypothesis:
"They are not entities that carry people off to the afterlife, but rather entities that notify individuals about boundaries."

## Observation Record
A certain individual encountered an entity at a late-night intersection.
The entity spoke a single phrase:
"It is still too early."

Several years later, the same individual narrowly avoided a catastrophic accident at that exact intersection.
The individual reflected, "Perhaps that encounter was a warning about this."

## Danger
**Low**
No direct harm has been verified.
However, the following psychological effects have been reported:
* Feeling uneasy or anxious.
* Becoming strangely obsessed with the words spoken.
* Being unable to forget the encounter for several years.

## Treatment in Toreki World
* **Commoners:** "What bad luck..."
* **Researchers:** "Yet another boundary case."
* **Children:** "It's the Messenger-san!"
* **Messenger:** "I am not."

## Remarks
The title "Messenger from the Underworld" is merely a colloquial name. When asked about their identity, the entity will only reply:
"It seems that is what I am called."
Therefore, whether they are truly a messenger from the afterlife remains unknown.

# Sendanto el la Postmondo id:16
## Klasifiko: Sovraĵtranspasa estaĵo
Kutima Nomo: Sendanto el la postmondo
![Sendanto el la Postmondo](../images/016.png)

## Superrigardo
La Sendanto el la postmondo estas estaĵo, pri kiu oni diras, ke ĝi "venis el la postmondo."
Tamen, ĉu ĝi vere venis el la postmondo, aŭ ĉu la postmondo entute ekzistas, restas nekonfirmite.

## Karakterizaĵoj
* Ofte vidata en homosimila formo.
* Ĝia aspekto tre varias laŭ ĉiu individua unuo.
* Atestoj de vidatestantoj pri ĝia aspekto ne kongruas.
* De kie ĝi venis, estas tute nekonate.

## Konduto
La Sendanto el la postmondo subite aperas, lasas mallongan mesaĝon, kaj poste nature malaperas.

**【Ekzemploj de lasitaj vortoj】**
* "Ankoraŭ ne."
* "Vi forgesis ion."
* "Tio ne estas la vojo."
* "Ĝis poste."

## Transpasa Fenomeno
La vortoj de la sendanto ofte estas tute nekompreneblaj en tiu momento.
Tamen, multe pli poste, la ricevinto eble subite komprenas kaj interpretas ilin:
"Ho, ĉu tio temis pri tiu afero tiam?"

## Miskompreno
La publiko ofte miskomprenas ilin kiel "Morton" (la Sinjoron de la Morto).
Tamen, esplor-raportoj montras, ke la plimulto de la homoj, kiujn la sendanto renkontis, daŭre vivas tute normale.

## Opinio de Instituto Toreki
La instituto adoptas la sekvan hipotezon:
"Ili ne estas estaĵoj, kiuj forportas homojn al la postmondo, sed prefere estaĵoj, kiuj sciigas pri la limoj."

## Observa Rikordo
Iu persono renkontis unuon ĉe meznokta vojkruciĝo.
La unuo diris nur unu frazon:
"Estas ankoraŭ tro frue."

Kelkajn jarojn poste, la sama persono apenaŭ evitis grandan akcidenton ĉe la sama vojkruciĝo.
La persono mem diris: "Eble tiu renkontiĝo temis pri ĉi tio."

## Danĝero
**Malalta**
Neniu rekta damaĝo estas konfirmita.
Tamen, la sekvaj mensaj efikoj estas raportitaj:
* Sentas maltrankvilon.
* Strange zorgas pri la vortoj.
* Ne povas forgesi la renkontiĝon dum pluraj jaroj.

## Traktado en Mondo Toreki
* **Plenkreskuloj:** "Kia malbona aŭguro..."
* **Esploristoj:** "Ĉu denove lima kazo?"
* **Infanoj:** "Jen Sendanto-san!"
* **Sendanto:** "Mi ne estas tio."

## Noto
La nomo "Sendanto el la Postmondo" estas nur kutima kromnomo. Kiam oni demandas al la unuo mem pri ĝia nomo, ĝi nur respondas:
"Ŝajnas, ke mi estas tiel nomata."
Tial, ĉu ĝi vere estas sendanto el la postmondo, ankoraŭ restas nekonate.
