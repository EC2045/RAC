# シンボル　id:Infinity
## 正式分類：原型情報集合体
通称：全ての生物の元となるもの

## 概要
シンボルは「生物」ではない。
それは、
生物が“そう見える理由そのもの”
である。
つまりクウキやモバジュウのような存在は、シンボルが具体化した結果にすぎない。

## 特徴
* 単体では観測できない
* しかし全ての生物に“含まれている”
* 形ではなく「傾向」として存在する
* 分解すると個別の生命概念になる

## 含有構造（観測例）
東暦研究所の解析によると、以下の存在に共通構造が見られる：
* ホモ・ザビエンス（人間系統）
* ウォーウルフ（共存適応型知的種）
* コロレン（小型車輪生物）
* クウキ（擬態気体群）
これらに共通して存在するのが、
「関係を作るための核」
と呼ばれるシンボル片である。

## 性質
シンボルは“生物を作る”のではなく、
「生物として認識される条件を揃える」
働きを持つ。
そのため、
* クウキは“空気としての関係”
* ナニカは“人間としての関係”
* トモガサは“友達としての関係”
をそれぞれ成立させている。

## 分類不能性
シンボルそのものは以下の問いに答えられない：
* それは生物か？
* それは概念か？
* それは情報か？
理由：
その問い自体がシンボルの内部で発生しているため
東暦研究所の仮説
最も有力な説：
「すべての生物はシンボルの“解釈違い”である」
つまり、
* 人間も
* ウォーウルフも
* クウキも
* 手.pngも
全部、
同じ“元の意味”の別読み

## 危険性
直接的な危険はない。
ただし深く理解しようとすると、
* 世界が単一の構造に見える
* 個体差が意味を失う
* 「違い」がただのノイズに見える
という状態に入る可能性がある。

## 東暦民間理解
一般人の認識：
「なんか全部つながってるらしい」
以上。

## 補足
ホモ・ザビエンスという表記については、研究者の間でも議論があるが、
「完全な人間という定義が揺らいでいる痕跡」
としてそのまま残されている。

## 結論
シンボルとは：
「存在の設計図」ではなく「存在が存在と呼ばれるための癖」

# Symbol id:Infinity
## Classification: Archetypal information aggregate
Common Name: The source of all lifeforms

## Overview
Symbol is not a "lifeform".
It is,
"the reason itself why lifeforms look so."
In other words, entities like Kuuki or Mobaju are merely the results of Symbol becoming concrete.

## Features
* Cannot be observed on its own.
* However, "included" in all lifeforms.
* Exists not as a shape but as a "tendency".
* When decomposed, it becomes individual life concepts.

## Containing Structure (Observation Example)
According to analysis by the Toreki Research Institute, a common structure is observed in the following existences:
* Homo Sabiens (human lineage)
* Warwolf (co-adaptation type intelligent species)
* Koloren (small wheeled creature)
* Kuuki (mimicry gas group)
Common to all of these is a Symbol fragment called:
"The core to build relationships"

## Nature
Symbol does not "create lifeforms", but acts to:
"Assemble the conditions to be perceived as lifeforms."
Therefore:
* Kuuki establishes "relationship as air"
* Nanika establishes "relationship as human"
* Tomogasa establishes "relationship as friend"
respectively.

## Unclassifiability
Symbol itself cannot answer the following questions:
* Is it a creature?
* Is it a concept?
* Is it information?
Reason: Because that question itself is generated inside Symbol.

## Toreki Hypothesis
The most promising theory:
"All lifeforms are 'different interpretations' of Symbol."
In other words:
* Humans
* Warwolves
* Kuuki
* Te.png
are all different readings of the same "original meaning".

## Danger
No direct danger.
However, trying to understand it deeply might enter a state where:
* The world looks like a single structure.
* Individual differences lose meaning.
* "Differences" look like mere noise.

## Toreki Civil Understanding
General perception: "Somehow everything seems to be connected."
That's it.

## Supplement
Regarding the notation Homo Sabiens, there is debate among researchers, but it is left as:
"The trace that the definition of a complete human is swaying."

## Conclusion
Symbol is:
Not "the blueprint of existence", but "the habit for existence to be called existence."

# Simbolo id:Infinity
## Klasifiko: Praforma informa agregato
Kutima Nomo: La fonto de ĉiuj vivuloj

## Superrigardo
Simbolo ne estas "vivulo".
Ĝi estas,
"la kialo mem kial vivuloj aspektas tiel."
Alivorte, estaĵoj kiel Kuki aŭ Mobaĵu estas simple la rezultoj de Simbolo fariĝanta konkreta.

## Karakterizaĵoj
* Ne estas observebla memstare.
* Tamen, "inkluzivita" en ĉiuj vivuloj.
* Ekzistas ne kiel formo sed kiel "tendenco".
* Kiam malkonstruita, ĝi fariĝas individuaj vivkonceptoj.

## Enen-strukturo (Ekzemplo de Observado)
Laŭ analizo de la Esplorinstituto Toreki, komuna strukturo estas observata en la sekvaj ekzistoj:
* Homo Sabiens (homa linio)
* Warwolf (kun-adapta inteligenta specio)
* Koloren (malgranda rada kreitaĵo)
* Kuki (mimika gasgrupo)
Komuna al ĉiuj ĉi tiuj estas Simbola fragmento nomata:
"La kerno por krei rilatojn"

## Ecoj
Simbolo ne "kreas vivulojn", sed funkcias por:
"Kunigi la kondiĉojn por esti perceptata kiel vivulo."
Tial:
* Kuki establas "rilaton kiel aero"
* Narihito establas "rilaton kiel homo"
* Tomogaŝa establas "rilaton kiel amiko"
respektive.

## Neklasifikebleco
Simbolo mem ne povas respondi al la sekvaj demandoj:
* Ĉu ĝi estas vivulo?
* Ĉu ĝi estas koncepto?
* Ĉu ĝi estas informo?
Kialo: Ĉar tiu demando mem estas generita interne de Simbolo.

## Hipotezo de Esplorinstituto Toreki
La plej promesplena teorio:
"Ĉiuj vivuloj estas 'malsamaj interpretoj' de Simbolo."
Alivorte:
* Homoj
* Lupo-homoj
* Kuki
* Mano.png
estas ĉiuj malsamaj legadoj de la sama "origina signifo".

## Danĝero
Neniu rekta danĝero.
Tamen, provante kompreni ĝin profunde, oni eble eniros staton kie:
* La mondo aperas kiel ununura strukturo.
* Individuaj diferencoj perdas signifon.
* "Diferencoj" aperas kiel nura bruo.

## Civila Kompreno en Toreki
Ĝenerala percepto de homoj: "Iel ĉio ŝajnas esti konektita."
Kaj tio estas ĉio.

## Aldono
Koncerne la notacion Homo Sabiens, ekzistas debato inter esploristoj, sed ĝi estas lasita kiel:
"La spuro ke la difino de perfekta homo ŝanceliĝas."

## Konkludo
Simbolo estas:
Ne "la skizo de ekzisto", sed "la kutimo por ke ekzisto estu nomata ekzisto."
